<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Age of War - Complet</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #1a1a2e;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
    width: 1000px;
    margin: 0 auto;
  }
  canvas {
    background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #8B7355 70%, #654321 100%);
    display: block;
    border: 2px solid #000;
  }
  #ui {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #111;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .stats { font-size: 14px; }
  .stats span { color: #FFD700; font-weight: bold; }
  #buttons {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding: 10px;
    background: #333;
  }
  button {
    background: #444;
    color: white;
    border: 2px solid #666;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 12px;
    transition: all 0.2s;
  }
  button:hover:not(:disabled) {
    background: #666;
    transform: translateY(-2px);
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .age-btn { background: #8B4513; }
  .unit-btn { background: #2E7D32; }
  .upgrade-btn { background: #6A1B9A; }
  .turret-btn { background: #C62828; }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.9);
    padding: 30px;
    border-radius: 10px;
    font-size: 30px;
    display: none;
    text-align: center;
    border: 3px solid gold;
    z-index: 100;
  }

  /* MENU */
  #menu {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    overflow-y: auto;
    padding: 20px;
  }
  #menu h1 {
    font-size: 60px;
    color: gold;
    text-shadow: 3px 3px 0 #000;
    margin: 10px;
  }
  #menu h2 { color: #4FC3F7; margin: 15px 0 5px; }
  .menu-section {
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 10px;
    margin: 10px;
    border: 2px solid #4FC3F7;
    min-width: 400px;
  }
  .menu-btn {
    display: block;
    width: 100%;
    padding: 15px;
    margin: 5px 0;
    font-size: 16px;
    background: #4FC3F7;
    color: #000;
    font-weight: bold;
  }
  .menu-btn:hover { background: #29B6F6; }
  .diff-btn { display: inline-block; width: auto; padding: 10px 20px; margin: 5px; }
  .diff-easy { background: #4CAF50; }
  .diff-medium { background: #FF9800; }
  .diff-hard { background: #F44336; }
  .diff-extreme { background: #9C27B0; }
  input {
    padding: 10px;
    font-size: 14px;
    border-radius: 5px;
    border: 2px solid #4FC3F7;
    background: #222;
    color: white;
    width: 100%;
    margin: 5px 0;
  }
  #connectionStatus {
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 5px;
    margin: 10px 0;
    font-size: 13px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- MENU PRINCIPAL -->
<div id="menu">
  <h1>⚔️ AGE OF WAR ⚔️</h1>
  
  <div id="mainMenu">
    <div class="menu-section">
      <h2>🎮 Mode de Jeu</h2>
      <button class="menu-btn" onclick="showSoloMenu()">🤖 Solo vs IA</button>
      <button class="menu-btn" onclick="showMultiMenu()">🌐 Multijoueur P2P</button>
    </div>
  </div>

  <!-- MENU SOLO -->
  <div id="soloMenu" class="hidden">
    <div class="menu-section">
      <h2>🤖 Choisir la difficulté de l'IA</h2>
      <p style="font-size:12px;opacity:0.8;">L'IA respecte son économie comme vous !</p>
      <button class="menu-btn diff-btn diff-easy" onclick="startSolo('easy')">😊 Facile</button>
      <button class="menu-btn diff-btn diff-medium" onclick="startSolo('medium')">😐 Moyen</button>
      <button class="menu-btn diff-btn diff-hard" onclick="startSolo('hard')">😈 Difficile</button>
      <button class="menu-btn diff-btn diff-extreme" onclick="startSolo('extreme')">💀 Extrême</button>
      <hr style="margin:15px 0;">
      <button class="menu-btn" onclick="showMain()">⬅️ Retour</button>
    </div>
  </div>

  <!-- MENU MULTI -->
  <div id="multiMenu" class="hidden">
    <div class="menu-section">
      <h2>🌐 Multijoueur P2P</h2>
      <p style="font-size:12px;opacity:0.8;">L'hôte crée la partie. L'invité rejoint avec l'ID.</p>
      
      <button class="menu-btn" onclick="hostGame()">🏠 Héberger une partie</button>
      
      <hr style="margin:15px 0;">
      
      <h3>🚪 Rejoindre une partie</h3>
      <input id="joinId" placeholder="ID de l'hôte..." />
      <button class="menu-btn" onclick="joinGame()">🚪 Rejoindre</button>

      <div id="connectionStatus" class="hidden"></div>
      
      <hr style="margin:15px 0;">
      <button class="menu-btn" onclick="showMain()">⬅️ Retour</button>
    </div>
  </div>
</div>

<!-- JEU -->
<div id="gameContainer" class="hidden">
  <div id="ui">
    <div class="stats">💰 Or: <span id="gold">100</span></div>
    <div class="stats">⭐ XP: <span id="xp">0</span> / <span id="xpNeeded">50</span></div>
    <div class="stats">🏛️ Époque: <span id="age">Préhistoire</span></div>
    <div class="stats">❤️ Base: <span id="baseHp">500</span> | 👹 Ennemi: <span id="enemyHp">500</span></div>
    <div class="stats" id="enemyInfo">🤖 IA: <span id="enemyGold">0</span>💰</div>
  </div>
  <canvas id="game" width="1000" height="400"></canvas>
  <div id="buttons"></div>
  <div id="message"></div>
</div>

<script>
// ============================================================
// CONFIGURATION DU JEU
// ============================================================
const AGES = [
  { name: "Préhistoire", color: "#8B4513", xpNeeded: 50 },
  { name: "Antiquité", color: "#DAA520", xpNeeded: 150 },
  { name: "Moyen Âge", color: "#708090", xpNeeded: 300 },
  { name: "Renaissance", color: "#4682B4", xpNeeded: 500 },
  { name: "Moderne", color: "#2F4F4F", xpNeeded: 800 },
  { name: "Futur", color: "#9400D3", xpNeeded: 1200 }
];

const UNITS = [
  [{hp:50,dmg:8,speed:0.8,cost:20,range:25,color:"#8B4513",name:"Cavernicole",emoji:"🪨"},
   {hp:30,dmg:12,speed:1.0,cost:35,range:120,color:"#654321",name:"Lanceur",emoji:"🦴"},
   {hp:120,dmg:20,speed:0.5,cost:80,range:30,color:"#A0522D",name:"Mammouth",emoji:"🐘"}],
  [{hp:80,dmg:15,speed:1.0,cost:40,range:30,color:"#DAA520",name:"Légionnaire",emoji:"⚔️"},
   {hp:50,dmg:20,speed:1.1,cost:60,range:150,color:"#B8860B",name:"Archer",emoji:"🏹"},
   {hp:200,dmg:40,speed:0.6,cost:150,range:35,color:"#CD853F",name:"Char",emoji:"🐎"}],
  [{hp:150,dmg:25,speed:1.0,cost:70,range:35,color:"#708090",name:"Chevalier",emoji:"🛡️"},
   {hp:80,dmg:35,speed:1.2,cost:100,range:170,color:"#778899",name:"Arbalétrier",emoji:"🎯"},
   {hp:300,dmg:60,speed:0.5,cost:250,range:200,color:"#2F4F4F",name:"Catapulte",emoji:"🪨"}],
  [{hp:200,dmg:40,speed:1.1,cost:120,range:140,color:"#4682B4",name:"Mousquetaire",emoji:"🔫"},
   {hp:150,dmg:55,speed:1.4,cost:180,range:40,color:"#5F9EA0",name:"Cavalier",emoji:"🐴"},
   {hp:400,dmg:90,speed:0.4,cost:350,range:220,color:"#1E3A5F",name:"Canon",emoji:"💣"}],
  [{hp:300,dmg:60,speed:1.2,cost:200,range:150,color:"#2F4F4F",name:"Soldat",emoji:"🪖"},
   {hp:600,dmg:120,speed:0.7,cost:500,range:180,color:"#556B2F",name:"Tank",emoji:"🚜"},
   {hp:200,dmg:150,speed:2.0,cost:700,range:250,color:"#4169E1",name:"Avion",emoji:"✈️"}],
  [{hp:500,dmg:100,speed:1.3,cost:300,range:160,color:"#9400D3",name:"Cyborg",emoji:"🤖"},
   {hp:1000,dmg:200,speed:0.8,cost:800,range:200,color:"#FF1493",name:"Mecha",emoji:"🦾"},
   {hp:400,dmg:300,speed:1.5,cost:1200,range:300,color:"#00FFFF",name:"Drone Laser",emoji:"🛸"}]
];

const TURRETS = [
  {dmg:5,range:150,cost:50,color:"#8B4513",name:"Pieux",emoji:"🪵"},
  {dmg:15,range:180,cost:120,color:"#DAA520",name:"Tour Archer",emoji:"🏹"},
  {dmg:30,range:200,cost:250,color:"#708090",name:"Tour Flèche",emoji:"🗼"},
  {dmg:60,range:220,cost:500,color:"#4682B4",name:"Tour Canon",emoji:"💥"},
  {dmg:100,range:250,cost:900,color:"#2F4F4F",name:"Mitrailleuse",emoji:"⚡"},
  {dmg:200,range:300,cost:1500,color:"#9400D3",name:"Tour Plasma",emoji:"🔮"}
];

// PROFILS DE DIFFICULTÉ IA
const DIFFICULTIES = {
  easy:    { goldRate: 0.7, decisionInterval: 180, evolveThreshold: 1.2, startGold: 100, name: "Facile" },
  medium:  { goldRate: 1.0, decisionInterval: 120, evolveThreshold: 1.0, startGold: 150, name: "Moyen" },
  hard:    { goldRate: 1.4, decisionInterval: 80,  evolveThreshold: 0.9, startGold: 200, name: "Difficile" },
  extreme: { goldRate: 2.0, decisionInterval: 50,  evolveThreshold: 0.8, startGold: 350, name: "Extrême" }
};

// ============================================================
// ÉTAT DU JEU
// ============================================================
let game = null;
let mode = 'solo'; // 'solo' | 'host' | 'client'
let peer = null;
let conn = null;

function createGameState() {
  return {
    player: {
      gold: 150, xp: 0, age: 0,
      baseHp: 500, baseMaxHp: 500,
      units: [], turrets: []
    },
    enemy: {
      gold: 150, xp: 0, age: 0,
      baseHp: 500, baseMaxHp: 500,
      units: [], turrets: [],
      decisionTimer: 0
    },
    projectiles: [],
    goldTimer: 0,
    enemyGoldTimer: 0,
    difficulty: 'medium',
    running: true
  };
}

// ============================================================
// MENU
// ============================================================
function showMain() {
  document.getElementById('mainMenu').classList.remove('hidden');
  document.getElementById('soloMenu').classList.add('hidden');
  document.getElementById('multiMenu').classList.add('hidden');
}
function showSoloMenu() {
  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('soloMenu').classList.remove('hidden');
}
function showMultiMenu() {
  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('multiMenu').classList.remove('hidden');
}

function startSolo(difficulty) {
  mode = 'solo';
  game = createGameState();
  game.difficulty = difficulty;
  const d = DIFFICULTIES[difficulty];
  game.enemy.gold = d.startGold;
  
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('gameContainer').classList.remove('hidden');
  initGame();
}

// ============================================================
// MULTIJOUEUR P2P
// ============================================================
function setStatus(msg) {
  const el = document.getElementById('connectionStatus');
  el.classList.remove('hidden');
  el.innerHTML = msg;
}

function hostGame() {
  setStatus("⏳ Création du serveur...");
  peer = new Peer();
  
  peer.on('open', (id) => {
    setStatus(`
      <b>🏠 Vous êtes l'hôte !</b><br>
      Votre ID : <input value="${id}" readonly onclick="this.select()" style="font-size:11px;"><br>
      <small>Partagez cet ID avec votre adversaire.<br>En attente d'un joueur...</small>
    `);
  });
  
  peer.on('connection', (c) => {
    conn = c;
    conn.on('open', () => {
      setStatus("✅ Joueur connecté ! Démarrage...");
      mode = 'host';
      setTimeout(() => startMultiGame(true), 1000);
    });
    setupConnection();
  });
  
  peer.on('error', (err) => {
    setStatus("❌ Erreur : " + err.message);
  });
}

function joinGame() {
  const hostId = document.getElementById('joinId').value.trim();
  if (!hostId) { setStatus("⚠️ Entrez un ID."); return; }
  
  setStatus("⏳ Connexion à l'hôte...");
  peer = new Peer();
  
  peer.on('open', () => {
    conn = peer.connect(hostId);
    conn.on('open', () => {
      setStatus("✅ Connecté ! Démarrage...");
      mode = 'client';
      setTimeout(() => startMultiGame(false), 1000);
    });
    setupConnection();
  });
  
  peer.on('error', (err) => {
    setStatus("❌ Erreur : " + err.message);
  });
}

function setupConnection() {
  conn.on('data', (data) => handleNetworkMessage(data));
  conn.on('close', () => {
    showMessage("⚠️ Adversaire déconnecté");
    if (game) game.running = false;
  });
}

function startMultiGame(isHost) {
  game = createGameState();
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('gameContainer').classList.remove('hidden');
  document.getElementById('enemyInfo').textContent = isHost ? '🌐 Adversaire connecté' : '🌐 Hôte connecté';
  initGame();
}

// Envoi d'actions sur le réseau
function sendAction(action) {
  if (conn && conn.open) conn.send(action);
}

// Réception d'actions adverses
function handleNetworkMessage(msg) {
  if (!game) return;
  // Les actions de l'adversaire impactent SON côté (qui est game.enemy chez nous)
  if (msg.type === 'spawn') {
    spawnUnitForSide(game.enemy, msg.unitType, true);
  } else if (msg.type === 'turret') {
    buildTurretForSide(game.enemy, true);
  } else if (msg.type === 'evolve') {
    if (game.enemy.age < AGES.length - 1) {
      game.enemy.age++;
      game.enemy.xp = 0;
    }
  } else if (msg.type === 'repair') {
    game.enemy.baseHp = Math.min(game.enemy.baseMaxHp, game.enemy.baseHp + 50);
  }
}

// ============================================================
// LOGIQUE DE JEU
// ============================================================
const W = 1000, H = 400, GROUND = H - 60;
let canvas, ctx;

function initGame() {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  updateButtons();
  loop();
}

// Spawn générique
function spawnUnitForSide(side, type, fromNetwork = false) {
  const u = UNITS[side.age][type];
  if (!fromNetwork) {
    if (side.gold < u.cost) return false;
    side.gold -= u.cost;
  }
  const isEnemy = (side === game.enemy);
  side.units.push({
    x: isEnemy ? W - 60 : 60,
    y: GROUND - 30,
    hp: u.hp, maxHp: u.hp, dmg: u.dmg,
    speed: u.speed * (isEnemy ? -1 : 1),
    range: u.range, color: u.color, emoji: u.emoji, name: u.name,
    attackCd: 0, isEnemy
  });
  return true;
}

function buildTurretForSide(side, fromNetwork = false) {
  const t = TURRETS[side.age];
  if (!fromNetwork) {
    if (side.gold < t.cost) return false;
    if (side.turrets.length >= 4) return false;
    side.gold -= t.cost;
  }
  const isEnemy = (side === game.enemy);
  const slot = side.turrets.length;
  side.turrets.push({
    x: isEnemy ? (W - 100 - slot * 30) : (80 + slot * 30),
    y: GROUND - 80,
    dmg: t.dmg, range: t.range, color: t.color, emoji: t.emoji, cd: 0
  });
  return true;
}

// Actions du joueur
function playerSpawn(type) {
  if (spawnUnitForSide(game.player, type)) {
    sendAction({type:'spawn', unitType:type});
  }
}
function playerTurret() {
  if (buildTurretForSide(game.player)) {
    sendAction({type:'turret'});
  }
}
function playerEvolve() {
  const p = game.player;
  if (p.age >= AGES.length - 1) return;
  if (p.xp < AGES[p.age].xpNeeded) return;
  p.age++; p.xp = 0;
  showMessage(`✨ Évolution: ${AGES[p.age].name} ✨`, 1500);
  sendAction({type:'evolve'});
  updateButtons();
}
function playerRepair() {
  if (game.player.gold >= 100) {
    game.player.gold -= 100;
    game.player.baseHp = Math.min(game.player.baseMaxHp, game.player.baseHp + 50);
    sendAction({type:'repair'});
  }
}

// ============================================================
// IA - RESPECTE SON ÉCONOMIE !
// ============================================================
function enemyAI() {
  if (mode !== 'solo') return; // En multi, c'est un humain
  
  const e = game.enemy;
  const diff = DIFFICULTIES[game.difficulty];
  
  e.decisionTimer++;
  if (e.decisionTimer < diff.decisionInterval) return;
  e.decisionTimer = 0;

  const availableUnits = UNITS[e.age];
  const turret = TURRETS[e.age];
  
  // PRIORITÉ 1 : Évoluer si possible
  if (e.age < AGES.length - 1 && e.xp >= AGES[e.age].xpNeeded * diff.evolveThreshold) {
    e.age++;
    e.xp = 0;
    return;
  }

  // PRIORITÉ 2 : Construire une tour si pas assez de défense
  if (e.turrets.length < 2 && e.gold >= turret.cost) {
    buildTurretForSide(e);
    return;
  }

  // PRIORITÉ 3 : Réparer si HP bas
  if (e.baseHp < e.baseMaxHp * 0.4 && e.gold >= 100) {
    e.gold -= 100;
    e.baseHp = Math.min(e.baseMaxHp, e.baseHp + 50);
    return;
  }

  // PRIORITÉ 4 : Construire des unités SI on a l'or
  // Choix tactique : équilibrer mêlée/distance/lourd
  const meleeCount = e.units.filter(u => u.range < 50).length;
  const rangedCount = e.units.filter(u => u.range >= 50 && u.range < 200).length;
  
  let preferredType;
  if (meleeCount < 2) preferredType = 0;
  else if (rangedCount < 2) preferredType = 1;
  else preferredType = Math.random() < 0.3 ? 2 : Math.floor(Math.random() * 3);

  // Si on n'a pas assez d'or pour le type choisi, prendre le moins cher abordable
  if (e.gold < availableUnits[preferredType].cost) {
    for (let i = 0; i < availableUnits.length; i++) {
      if (e.gold >= availableUnits[i].cost) {
        preferredType = i;
        spawnUnitForSide(e, preferredType);
        return;
      }
    }
    return; // Pas assez d'or pour quoi que ce soit → l'IA économise
  }
  
  // PRIORITÉ 5 : Économiser pour évoluer si proche
  const xpRatio = e.xp / AGES[e.age].xpNeeded;
  if (xpRatio > 0.8 && e.gold < availableUnits[2].cost && e.age < AGES.length - 1) {
    return; // Attendre pour économiser
  }

  spawnUnitForSide(e, preferredType);
}

// ============================================================
// COMBAT
// ============================================================
function findTarget(u, list) {
  let closest = null, minDist = Infinity;
  list.forEach(t => {
    const d = Math.abs(t.x - u.x);
    if (d < minDist) { minDist = d; closest = t; }
  });
  return closest;
}

function updateSideUnits(side, opposing, baseX, attackBaseCondition) {
  side.units.forEach(u => {
    const target = findTarget(u, opposing.units);
    
    if (target && Math.abs(target.x - u.x) <= u.range) {
      u.attackCd--;
      if (u.attackCd <= 0) {
        if (u.range > 50) {
          game.projectiles.push({x:u.x, y:u.y, tx:target.x, ty:target.y, dmg:u.dmg, target, color:u.color});
        } else {
          target.hp -= u.dmg;
        }
        u.attackCd = 40;
      }
    } else if (attackBaseCondition(u)) {
      u.attackCd--;
      if (u.attackCd <= 0) {
        opposing.baseHp -= u.dmg;
        u.attackCd = 40;
      }
    } else {
      u.x += u.speed;
    }
  });
}

function updateCombat() {
  // Player units
  updateSideUnits(game.player, game.enemy, W - 80, (u) => u.x >= W - 100);
  // Enemy units
  updateSideUnits(game.enemy, game.player, 80, (u) => u.x <= 100);

  // Tours
  [...game.player.turrets].forEach(t => updateTurret(t, game.enemy.units));
  [...game.enemy.turrets].forEach(t => updateTurret(t, game.player.units));

  // Projectiles
  game.projectiles = game.projectiles.filter(p => {
    const dx = p.tx - p.x, dy = p.ty - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 10) {
      if (p.target && p.target.hp > 0) p.target.hp -= p.dmg;
      return false;
    }
    p.x += dx/dist * 8;
    p.y += dy/dist * 8;
    return true;
  });

  // Nettoyage
  cleanDead(game.player, game.enemy);
  cleanDead(game.enemy, game.player);
}

function updateTurret(t, targets) {
  t.cd--;
  if (t.cd <= 0) {
    const target = targets.find(e => Math.abs(e.x - t.x) <= t.range);
    if (target) {
      game.projectiles.push({x:t.x, y:t.y, tx:target.x, ty:target.y, dmg:t.dmg, target, color:t.color});
      t.cd = 50;
    }
  }
}

function cleanDead(killer, victim) {
  const killed = victim.units.filter(u => u.hp <= 0);
  killed.forEach(u => {
    killer.gold += 15 + victim.age * 10;
    killer.xp += 10 + victim.age * 5;
  });
  victim.units = victim.units.filter(u => u.hp > 0);
}

function updateGold() {
  game.goldTimer++;
  if (game.goldTimer > 60) {
    game.goldTimer = 0;
    game.player.gold += 5 + game.player.age * 2;
  }
  game.enemyGoldTimer++;
  if (game.enemyGoldTimer > 60) {
    game.enemyGoldTimer = 0;
    const rate = mode === 'solo' ? DIFFICULTIES[game.difficulty].goldRate : 1;
    game.enemy.gold += (5 + game.enemy.age * 2) * rate;
  }
}

// ============================================================
// DESSIN
// ============================================================
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = AGES[game.player.age].color;
  ctx.fillRect(0, GROUND, W, H - GROUND);

  drawBase(40, GROUND, "#4A90E2", "🏰", game.player.baseHp, game.player.baseMaxHp);
  drawBase(W - 100, GROUND, "#E24A4A", "🏯", game.enemy.baseHp, game.enemy.baseMaxHp);

  [...game.player.turrets, ...game.enemy.turrets].forEach(t => {
    ctx.fillStyle = t.color;
    ctx.fillRect(t.x - 10, t.y, 20, 30);
    ctx.font = "20px Arial";
    ctx.fillText(t.emoji, t.x - 10, t.y + 20);
  });

  [...game.player.units, ...game.enemy.units].forEach(u => {
    ctx.fillStyle = u.color;
    ctx.fillRect(u.x - 12, u.y - 5, 24, 30);
    ctx.font = "20px Arial";
    ctx.fillText(u.emoji, u.x - 10, u.y + 15);
    ctx.fillStyle = "red";
    ctx.fillRect(u.x - 15, u.y - 12, 30, 4);
    ctx.fillStyle = "lime";
    ctx.fillRect(u.x - 15, u.y - 12, 30 * (u.hp / u.maxHp), 4);
  });

  game.projectiles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // XP bar
  const xpNeeded = AGES[game.player.age].xpNeeded;
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(W/2 - 100, 10, 200, 15);
  ctx.fillStyle = "gold";
  ctx.fillRect(W/2 - 100, 10, 200 * Math.min(1, game.player.xp / xpNeeded), 15);
  ctx.strokeStyle = "white";
  ctx.strokeRect(W/2 - 100, 10, 200, 15);
  ctx.fillStyle = "white";
  ctx.font = "12px Arial";
  ctx.textAlign = "center";
  ctx.fillText(`XP ${game.player.xp}/${xpNeeded}`, W/2, 22);
  ctx.textAlign = "left";
}

function drawBase(x, y, color, emoji, hp, maxHp) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y - 80, 60, 80);
  ctx.font = "40px Arial";
  ctx.fillText(emoji, x + 8, y - 30);
  ctx.fillStyle = "red";
  ctx.fillRect(x, y - 90, 60, 6);
  ctx.fillStyle = "lime";
  ctx.fillRect(x, y - 90, 60 * (hp/maxHp), 6);
}

// ============================================================
// UI
// ============================================================
function updateStats() {
  document.getElementById('gold').textContent = Math.floor(game.player.gold);
  document.getElementById('xp').textContent = game.player.xp;
  document.getElementById('xpNeeded').textContent = AGES[game.player.age].xpNeeded;
  document.getElementById('age').textContent = AGES[game.player.age].name;
  document.getElementById('baseHp').textContent = Math.max(0, Math.floor(game.player.baseHp));
  document.getElementById('enemyHp').textContent = Math.max(0, Math.floor(game.enemy.baseHp));
  
  if (mode === 'solo') {
    document.getElementById('enemyInfo').innerHTML = 
      `🤖 IA (${DIFFICULTIES[game.difficulty].name}): <span>${Math.floor(game.enemy.gold)}</span>💰 | Âge: ${AGES[game.enemy.age].name}`;
  }
}

function updateButtons() {
  const btns = document.getElementById('buttons');
  btns.innerHTML = '';
  
  UNITS[game.player.age].forEach((u, i) => {
    const b = document.createElement('button');
    b.className = 'unit-btn';
    b.innerHTML = `${u.emoji} ${u.name}<br>💰${u.cost}`;
    b.onclick = () => playerSpawn(i);
    btns.appendChild(b);
  });

  const t = TURRETS[game.player.age];
  const tb = document.createElement('button');
  tb.className = 'turret-btn';
  tb.innerHTML = `${t.emoji} ${t.name}<br>💰${t.cost}`;
  tb.onclick = playerTurret;
  btns.appendChild(tb);

  if (game.player.age < AGES.length - 1) {
    const eb = document.createElement('button');
    eb.className = 'age-btn';
    eb.innerHTML = `⬆️ Évoluer<br>${AGES[game.player.age + 1].name}`;
    eb.onclick = playerEvolve;
    btns.appendChild(eb);
  }

  const rb = document.createElement('button');
  rb.className = 'upgrade-btn';
  rb.innerHTML = `🔧 Réparer<br>💰100 (+50hp)`;
  rb.onclick = playerRepair;
  btns.appendChild(rb);
}

function showMessage(msg, duration) {
  const m = document.getElementById('message');
  m.innerHTML = msg;
  m.style.display = 'block';
  if (duration) setTimeout(() => m.style.display = 'none', duration);
}

// ============================================================
// LOOP
// ============================================================
let lastAge = 0;
function loop() {
  if (!game || !game.running) return;

  enemyAI();
  updateCombat();
  updateGold();
  draw();
  updateStats();

  if (game.player.age !== lastAge) {
    lastAge = game.player.age;
    updateButtons();
  }

  if (game.player.baseHp <= 0) {
    game.running = false;
    showMessage("💀 DÉFAITE 💀<br><small>Recharge la page pour rejouer</small>");
    return;
  }
  if (game.enemy.baseHp <= 0) {
    game.running = false;
    showMessage("🏆 VICTOIRE ! 🏆<br><small>Recharge la page pour rejouer</small>");
    return;
  }

  requestAnimationFrame(loop);
}
</script>
